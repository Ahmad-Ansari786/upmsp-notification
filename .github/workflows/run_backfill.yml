name: Run AI Summary Backfill

on:
  workflow_dispatch:  # Yeh line GitHub me ek 'Run workflow' ka manual button bana degi

jobs:
  run_backfill:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Inject Firebase Secret Key JSON
      run: |
        cat << 'EOF' > serviceAccountKey.json
        ${{ secrets.FIREBASE_JSON_DATA }}
        EOF

    - name: Execute Backfill Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
      run: python backfill_summaries.py
