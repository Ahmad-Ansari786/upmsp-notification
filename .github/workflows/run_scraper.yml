name: UPMSP Auto Scraper Service

on:
  schedule:
    - cron: '*/30 * * * *'  # Har 30 minute me automatic chalega
  workflow_dispatch:       # Manual button active rahega

jobs:
  build_and_run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Inject Firebase Secret Key JSON
      run: |
        cat << 'EOF' > serviceAccountKey.json
        ${{ secrets.FIREBASE_JSON_DATA }}
        EOF

    - name: Execute Scraper Engine
      env:
        CF_ACCESS_KEY: ${{ secrets.CF_ACCESS_KEY }}
        CF_SECRET_KEY: ${{ secrets.CF_SECRET_KEY }}
        CF_ENDPOINT: ${{ secrets.CF_ENDPOINT }}
        CF_PUBLIC_URL: ${{ secrets.CF_PUBLIC_URL }}
        CF_BUCKET_NAME: ${{ secrets.CF_BUCKET_NAME }}
      run: python updater.py
