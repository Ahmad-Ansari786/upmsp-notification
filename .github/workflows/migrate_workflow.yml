name: R2 Migration Service

on:
  workflow_dispatch: # Yeh manual trigger hai, isse aapke main scraper ka schedule disturb nahi hoga

jobs:
  migrate_data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Inject Firebase Secret Key JSON
      run: |
        cat << 'EOF' > serviceAccountKey.json
        ${{ secrets.FIREBASE_JSON_DATA }}
        EOF

    - name: Run Migration Script
      env:
        # Purane (Source) Cloudflare variables (Aapke existing scraper wale secrets)
        CF_ACCESS_KEY: ${{ secrets.CF_ACCESS_KEY }}
        CF_SECRET_KEY: ${{ secrets.CF_SECRET_KEY }}
        CF_ENDPOINT: ${{ secrets.CF_ENDPOINT }}
        CF_BUCKET_NAME: ${{ secrets.CF_BUCKET_NAME }}
        CF_PUBLIC_URL: ${{ secrets.CF_PUBLIC_URL }}
        
        # Naye (Destination) Cloudflare variables (Naye secrets jo aap add karenge)
        DEST_CF_ACCOUNT_ID: ${{ secrets.DEST_CF_ACCOUNT_ID }}
        DEST_CF_ACCESS_KEY: ${{ secrets.DEST_CF_ACCESS_KEY }}
        DEST_CF_SECRET_KEY: ${{ secrets.DEST_CF_SECRET_KEY }}
        DEST_CF_BUCKET_NAME: ${{ secrets.DEST_CF_BUCKET_NAME }}
        DEST_CF_PUBLIC_URL: ${{ secrets.DEST_CF_PUBLIC_URL }}
      run: python migrate_r2.py
