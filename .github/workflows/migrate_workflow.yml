name: R2 Migration Service

on:
  workflow_dispatch: # Yeh schedule par nahi, balki sirf aapke button dabane par chalega

jobs:
  migrate_data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Inject Firebase Secret Key JSON
      run: |
        cat << 'EOF' > serviceAccountKey.json
        ${{ secrets.FIREBASE_JSON_DATA }}
        EOF

    - name: Run Migration Script
      env:
        # Purane Cloudflare ke variables (Scraper wale secrets reuse kar rahe hain)
        SOURCE_ACCESS_KEY: ${{ secrets.CF_ACCESS_KEY }}
        SOURCE_SECRET_KEY: ${{ secrets.CF_SECRET_KEY }}
        SOURCE_ENDPOINT: ${{ secrets.CF_ENDPOINT }}
        SOURCE_BUCKET: ${{ secrets.CF_BUCKET_NAME }}
        
        # Naye Cloudflare ke variables
        DEST_ACCOUNT_ID: ${{ secrets.DEST_CF_ACCOUNT_ID }}
        DEST_ACCESS_KEY: ${{ secrets.DEST_CF_ACCESS_KEY }}
        DEST_SECRET_KEY: ${{ secrets.DEST_CF_SECRET_KEY }}
        DEST_BUCKET: ${{ secrets.DEST_CF_BUCKET_NAME }}
      run: python migrate_r2.py
