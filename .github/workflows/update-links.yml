name: Update Firebase Links

on:
  push:
    branches:
      - main
    paths:
      - 'update_links.py' # Tarika 1: Jab bhi aap update_links.py mein change karke push karenge
  workflow_dispatch:      # Tarika 2: GitHub website par manual "Run workflow" button dikhayega

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Firebase Admin
        run: pip install firebase-admin

      - name: Run Python Script to Update Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: python update_links.py
