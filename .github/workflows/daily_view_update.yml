name: Firestore Daily View Update

on:
  schedule:
    - cron: '0 0 * * *' # Har raat 12 baje UTC par chalega
  workflow_dispatch: # Manual testing ke liye button

jobs:
  update-views:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install firebase-admin
        
      - name: Run Update Script
        env:
          # Secret name wahi hai jo aapne bataya tha
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          # Service Account JSON file generate karna workflow ke runtime mein
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > serviceAccountKey.json
          # Python script ko run karna
          python scripts/update_daily_views.py
